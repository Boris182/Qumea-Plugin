<!doctype html>
<html lang="de">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Qumea Plugin</title>
    <!-- Favicon-->
    <link rel="icon" href="/static/assets/icons/favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5 CSS -->
    <link href="/static/libs/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="/static/libs/css/bootstrap-icons.css">
    
    <!-- DataTables + Bootstrap 5 + Responsive + jQuery (kombinierte Version) -->
    <link rel="stylesheet" href="/static/libs/css/datatables.min.css">

<body class="bg-body">

  <button

    data-bs-toggle="offcanvas"
    data-bs-target="#sidebar"

    <div class="offcanvas-body d-flex flex-column p-0 vh-100">
      <div class="p-4 border-bottom">

        <ul class="nav nav-pills flex-column gap-1">
          <li class="nav-item">
            <a class="nav-link active" href="#" data-page="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="settings.html">Settings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-bs-toggle="collapse" href="#administrationSubmenu" role="button" aria-expanded="false" aria-controls="administrationSubmenu">

            </a>
            <div class="collapse ps-3" id="administrationSubmenu">
              <ul class="nav flex-column">
                <li class="nav-item">
                  <a class="nav-link" href="#" data-page="rooms.html">Rooms</a>

              </ul>
            </div>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-bs-toggle="collapse" href="#maintenanceSubmenu" role="button" aria-expanded="false" aria-controls="maintenanceSubmenu">

                  <a class="nav-link" href="#" data-page="backups.html">Backups</a>

                <li class="nav-item">
                  <a class="nav-link" href="#" data-page="logs.html">Logs</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#" data-page="system.html">System</a>
                </li>
              </ul>
            </div>
          </li>

        </ul>
        <div class="mt-auto pt-2">
          <a href="#logout" class="btn btn-danger w-100" onclick="logout()">Logout</a>
        </div>

    </div>

      <noscript>Bitte JavaScript aktivieren.</noscript>

  <script src="/static/app.js"></script>
