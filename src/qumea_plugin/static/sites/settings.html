<div class="container-fluid">
  <section>
    <div class="row">
      <div class="col-12 mb-4">
        <div class="card">
          <div class="card-header">
            <h4 class="mb-1">Qumea TelecareIPSettings</h4>
            <p class="mb-0">Einstellungen für Qumea und Telecare</p>
          </div>

          <div class="card-body">
            <div class="container-fluid px-0">

              <!-- Allgemein -->
              <div class="mb-3">
                <h5 class="mb-3">Allgemein</h5>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    Service Start bei Systemstart
                  </label>
                  <div class="col-md-9">
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" id="service_enabled" name="darkmode" value="no">
                      <label class="form-check-label" for="service_enabled">Deaktiviert</label>
                    </div>
                    <div class="text-muted small mt-1">Service Aktivieren / Deaktivieren</div>
                  </div>
                </div>
              </div>

              <hr class="my-4">

              <!-- Qumea -->
              <div class="mb-3">
                <h5 class="mb-3">Qumea</h5>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    Qumea Tenant ID
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="qumea_tenant_id" placeholder="test-tenant">
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    Qumea MQTT Host
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="qumea_mqtt_host" placeholder="mqtt.qumea.com">
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    Qumea MQTT Port
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="qumea_mqtt_port" placeholder="8883">
                    <div class="text-muted small mt-1">Port (z. B. 8883)</div>
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    Qumea Client ID
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="qumea_client_id" placeholder="axelion-client">
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    Qumea Integration ID
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="qumea_integration_id" placeholder="axelion-integration">
                  </div>
                </div>

                <div class="row mb-3">
                  <label class="col-md-3 col-form-label text-muted small">
                    Qumea Events
                  </label>
                  <div class="col-md-9">
                    <div class="form-check">
                      <input class="form-check-input event-type" type="checkbox" value="FALL" id="fall_event_checkbox">
                      <label class="form-check-label" for="fall_event_checkbox">Sturz</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input event-type" type="checkbox" value="BED" id="bed_event_checkbox">
                      <label class="form-check-label" for="bed_event_checkbox">Aufstehen</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input event-type" type="checkbox" value="NO_RETURN" id="no_return_event_checkbox">
                      <label class="form-check-label" for="no_return_event_checkbox">Keine Rückkehr</label>
                    </div>

                    <div class="text-muted small mt-1">Qumea Events to handle</div>
                  </div>
                </div>
              </div>

              <hr class="my-4">

              <!-- TelecareIP -->
              <div class="mb-3">
                <h5 class="mb-3">TelecareIP</h5>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    vNISM IP Adresse
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="ssh_host" placeholder="192.168.1.10">
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    vNISM SSH Port
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="ssh_port" placeholder="2222">
                  </div>
                </div>

                
              </div>

              <!-- UCM -->
              <div class="mb-3">
                <h5 class="mb-3">UCM</h5>

                <div class="row mb-3 align-items-center">
                  <label class="col-md-3 col-form-label text-muted small">
                    UCM Base URL
                  </label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" id="http_base_url" placeholder="http://192.168.1.20">
                  </div>
                </div>
              </div>

              <!-- Buttons -->
              <div class="row mt-4">
                <div class="col-md-9 offset-md-3 d-flex gap-2 flex-wrap">
                  <button class="btn btn-success" id="save_settings" onclick="save_settings()">Speichern</button>
                  <button class="btn btn-secondary" id="get_settings" onclick="reload_settings()">Reload</button>
                  <button class="btn btn-primary" id="get_events" onclick="get_events_to_handle()">Events</button>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </section>
</div>
