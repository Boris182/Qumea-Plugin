<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" href="/static/assets/icons/favicon.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      /*background: url('/static/assets/img/login-bg.jpg') no-repeat center center fixed;
      background-size: cover; */
      background: linear-gradient(225deg, #e94a54, #9051e4);
      background-size: cover;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; /* optional, verhindert jede Scrollbar */
    }

    .login-card {
      min-width: 300px;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(6px);
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
    }


  </style>
  <script defer src="/static/js/login.js"></script>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4 login-card">
      <div class="text-center">
        <img src="../assets/img/axe-logo.png" alt="Logo" class="img-fluid mb-3" style="max-width: 150px;">
      </div>
      <h4 class="text-center mb-3">Login</h4>
      
      <form id="login-form">
        <div class="mb-3">
          <label for="user_name" class="form-label">User Name</label>
          <input type="text" class="form-control" id="user_name" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Passwort</label>
          <input type="password" class="form-control" id="password" required />
        </div>
        <button type="submit" class="btn btn-dark w-100">Einloggen</button>
      </form>
      <div class="text-center mt-3">
        <button onclick="window.location.href='/static/sites/register.html'" class="btn btn-outline-secondary btn-sm">Registrieren</button>
      </div>
      <div id="login-error" class="text-danger mt-3 text-center" style="display:none;"></div>
    </div>
  </div>
</body>
</html>
