<h1 class="h3 mb-3">Logs</h1>
<pre id="logOutput" style="background:#111; color:rgb(209, 212, 209); padding:1rem; height:600px; overflow-y:auto;"></pre>
<div class="row g-4">
    <div class="col-12 col-xl-6">
        <div class="card">
            <div class="card-header">
                <h4>Logging Settings</h4>
            </div>
            <div class="card-body">
                <div>
                    <select class="form-select" id="logLevelInput" style="max-width: 200px;">
                        <option value="INFO"></option>
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO">INFO</option>
                        <option value="WARNING">WARNING</option>
                        <option value="ERROR">ERROR</option>
                        <option value="CRITICAL">CRITICAL</option>
                    </select>
                    <button type="button" class="btn btn-secondary mt-2" onclick="updateLogLevel()">Change Log Level</button>
                    <button type="button" class="btn btn-primary mt-2" onclick="downloadLogs()">Download Logs</button>
                    <label id="logLevelStatus" class="form-text text-success mt-2" style="display: none;">Log Level updated successfully!</label>
                    <p class="form-text text-muted mt-2">
                        Current log level: <span id="currentLogLevel">INFO</span>
                    </p>
                    
                </div>
            </div>
        </div>
    </div>
</div>
