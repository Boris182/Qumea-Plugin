<h1 class="h3 mb-3">Rooms</h1>
<button type="button" class="btn btn-dark" onclick="getRooms()">
    Lade Rooms
</button>
<button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addRoomModal">
    Room hinzufügen
</button>

<div class="container-fluid mt-3 px-3">
    <table id="roomsTable" class="table table-sm table-striped table-hover align-middle mb-0 w-100">
      <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Room Name</th>
            <th>Ascom Device ID</th>
            <th>Aktion</th>
        </tr>
      </thead>
      <tbody id="rooms-table-body">
        <tr>
          <td colspan="6" class="text-center text-muted py-4">Keine Räume gefunden</td>
        </tr>
      </tbody>
    </table>
</div>

<div class="d-flex flex-wrap gap-2 mb-3">
    <button id="btnExportCsv" class="btn btn-primary">
        <i class="bi bi-download me-1"></i> Export CSV
    </button>


    <label class="btn btn-danger mb-0" for="inputCsv">
        <i class="bi bi-upload me-1"></i> Import CSV (überschreibt alles)
    </label>
    <input id="inputCsv" type="file" accept=".csv,text/csv" class="d-none">
</div>

<!-- Add Room Modal -->
<div class="modal fade" id="addRoomModal" tabindex="-1" aria-labelledby="addRoomModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addRoomModalLabel">Neues Room hinzufügen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
            </div>
            <div class="modal-body">
                <form id="addRoomForm">
                <div class="mb-3">
                    <label for="add_room_name" class="form-label">Room Name</label>
                    <input type="text" class="form-control" id="add_room_name" required>
                </div>
                <div class="mb-3">
                    <label for="add_ascom_device_id" class="form-label">Ascom Device ID</label>
                    <input type="text" class="form-control" id="add_ascom_device_id" required>
                </div>
                <button type="button" class="btn btn-primary" onclick="submitRoom()">Hinzufügen</button>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- End Add Room Modal -->

<!-- Edit Room Modal -->
<div class="modal fade" id="editRoomModal" tabindex="-1" aria-labelledby="editRoomModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editRoomModalLabel">Room bearbeiten</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit_id">
                <div class="mb-3">
                    <label for="edit_room_name" class="form-label">Room Name</label>
                    <input type="text" class="form-control" id="edit_room_name">
                </div>
                <div class="mb-3">
                    <label for="edit_ascom_device_id" class="form-label">Ascom Device ID</label>
                    <input type="text" class="form-control" id="edit_ascom_device_id">
                </div>
                <button type="button" class="btn btn-secondary" onclick="submitRoomEdit()">Änderungen speichern</button>
            </div>
        </div>
    </div>
</div>
