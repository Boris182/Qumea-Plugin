<h1 class="h3 mb-3">Backups</h1>
<div class="row g-4">
    <div class="col-12 col-xl-6">
        <div class="card">
            <div class="card-header">
                <h4>Database</h4>
            </div>
            <div class="card-body">
                <p>Database Size: <span id="databaseSize">0 MB</span></p>
                <p>Last Backup: <span id="lastBackup">N/A</span></p>
                <button type="button" class="btn btn-secondary" onclick="backupDatabase()">Backup Database</button>
                <button class="btn btn-primary" onclick="downloadBackup()"><i class="bi bi-download me-1"></i>Download Latest</button>
                <label class="btn btn-danger mb-0" for="inputDB">
                    <i class="bi bi-upload me-1"></i> Import DB (überschreibt alles)
                </label>
                <input id="inputDB" type="file" accept=".enc" class="d-none">
            </div>
        </div>
    </div>
</div>
