<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/assets/icons/favicon.ico" type="image/x-icon">
  <title>Registrieren</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(225deg, #e94a54, #9051e4);
      background-size: cover;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; /* optional, verhindert jede Scrollbar */
    }

    .register-card {
      min-width: 300px;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(6px);
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
    }
  </style>
  <script defer src="/static/js/register.js"></script>
</head>

<body>
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4 register-card">
      <h3 class="text-center mb-3">Registrieren</h3>
      <h5 class="text-center mb-3">Bitte erstelle ein Login. Achtung! Du darfst nur ein Login erstellen.</h5>
      <form id="register-form">

        <div class="mb-3">
          <label for="username" class="form-label">User Name</label>
          <input type="text" class="form-control" id="username" required />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Passwort</label>
          <input type="password" class="form-control" id="password" required />
        </div>

        <div class="mb-3">
          <label for="password_repeat" class="form-label">Passwort wiederholen</label>
          <input type="password" class="form-control" id="password_repeat" required />
          <div id="password-error" class="text-danger small mt-1" style="display:none;">
            Passwörter stimmen nicht überein.
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Registrieren</button>
      </form>
      <div id="register-error" class="text-danger mt-3 text-center" style="display:none;"></div>
    </div>
  </div>
</body>
</html>
